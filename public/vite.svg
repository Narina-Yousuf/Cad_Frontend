<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  
  <!-- Heart shape -->
  <path d="M256 390 C256 390 100 290 100 185 C100 140 135 105 180 105 C210 105 235 120 256 145 C277 120 302 105 332 105 C377 105 412 140 412 185 C412 290 256 390 256 390Z" 
        fill="url(#heart)" opacity="0.95"/>
  
  <!-- ECG line through heart -->
  <polyline points="130,220 170,220 190,170 210,270 230,190 250,230 265,230 280,200 300,240 330,220 380,220" 
            fill="none" stroke="#0ea5e9" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
